name: CI

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check config src scripts tests
      - run: ruff format --check config src scripts tests
      - run: python -m compileall -q config src scripts tests
      - run: pytest
      - run: python -m pip wheel --no-deps --wheel-dir dist .
      - name: Smoke-test the built wheel in isolation
        shell: bash
        run: |
          python -m venv "${RUNNER_TEMP}/wheeltest"
          "${RUNNER_TEMP}/wheeltest/bin/python" -m pip install dist/*.whl
          cd "${RUNNER_TEMP}"
          "${RUNNER_TEMP}/wheeltest/bin/pgllm-data" --help
          "${RUNNER_TEMP}/wheeltest/bin/pgllm-init" --help
          "${RUNNER_TEMP}/wheeltest/bin/pgllm-run" --help
          "${RUNNER_TEMP}/wheeltest/bin/pgllm-status" --help
          "${RUNNER_TEMP}/wheeltest/bin/pgllm-score" --help
          "${RUNNER_TEMP}/wheeltest/bin/pgllm-export" --help
          "${RUNNER_TEMP}/wheeltest/bin/pgllm-models" --help
          "${RUNNER_TEMP}/wheeltest/bin/pgllm-verify-splits" --help
